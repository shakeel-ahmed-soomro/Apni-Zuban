<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apni Zuban Ultimate Compiler Studio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
</head>
<body>

    <header>
        <div class="logo-section">
            <h1 id="app-title">LangEngine <span>Compiler Core</span></h1>
        </div>
        <div class="controls">
            <button class="btn-run" onclick="executeSourceCode()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                Compile & Execute
            </button>
        </div>
    </header>

    <div class="workspace">
        <div class="pane pane-left">
            <div class="pane-header">
                <div>Source Code</div>
                <div id="lang-indicator" style="color: #8b5cf6;">Compiler Workspace</div>
            </div>
            <div id="editor-container"></div>
        </div>

        <div class="pane">
            <div class="pane-header">
                <div>Compiler Diagnostics & Output</div>
                <div style="cursor:pointer; color:#ef4444;" onclick="clearConsole()">Clear Console</div>
            </div>
            <div id="terminal-screen" class="terminal-container">
                <div class="terminal-line terminal-welcome">/* Compiler Engine loaded. All 6 AST pipeline phases active. */</div>
            </div>
        </div>
    </div>

    <div class="config-hint">
        <div>💡 <strong>Compiler Mode:</strong> Converts "Apni Zuban" to TAC, optimizes via Constant Folding, and compiles directly to Javascript byte-code.</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
